<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Concrete Defender — ConcreteXYZ</title>
<meta property="og:title" content="Concrete Defender"/>
<meta property="og:description" content="Protect the vault. Destroy liquidation bots. Earn CONC."/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #0a0a0a;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; font-family: monospace;
}
#wrap { width: 100%; max-width: 700px; padding: 0.75rem; }
#hud {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 8px;
  flex-wrap: wrap; gap: 6px;
}
.hud-stat { font-size: 11px; color: #555; }
.hud-stat span { font-size: 14px; font-weight: 500; color: #fff; }
canvas {
  display: block; border-radius: 12px;
  border: 0.5px solid #1c1c1c; background: #0a0a0a;
  width: 100%; cursor: none;
}
#footer {
  margin-top: 8px; display: flex;
  justify-content: space-between; align-items: center;
  font-size: 10px; color: #333;
}
#footer a { color: #F5E98A; text-decoration: none; opacity: 0.6; }
#footer a:hover { opacity: 1; }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="hud-stat">CONC <span id="scoreEl">0</span></div>
    <div class="hud-stat">TVL <span id="tvlEl">$902.3M</span></div>
    <div class="hud-stat">WAVE <span id="waveEl">1</span></div>
    <div class="hud-stat">CHAIN <span id="chainEl">×1</span></div>
    <div class="hud-stat">VAULT <span id="livesEl">❤️❤️❤️</span></div>
    <div class="hud-stat">BEST <span id="bestEl">0</span></div>
  </div>
  <canvas id="c"></canvas>
  <div id="footer">
    <span>CONCRETE DEFENDER · @ConcreteXYZ</span>
    <a href="https://concrete.xyz" target="_blank">concrete.xyz ↗</a>
  </div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=660,H=460;
canvas.width=W;canvas.height=H;

const LS=44;
const logoCanvas=document.createElement('canvas');
logoCanvas.width=LS;logoCanvas.height=LS;
const lc=logoCanvas.getContext('2d');
function rrect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();}
(function(){lc.clearRect(0,0,LS,LS);lc.fillStyle='#F5E98A';rrect(lc,0,0,LS,LS,LS*0.12);lc.fill();lc.fillStyle='#1a1a1a';lc.fillRect(LS*0.22,LS*0.13,LS*0.56,LS*0.07);lc.fillRect(LS*0.22,LS*0.80,LS*0.56,LS*0.07);lc.font=`bold ${LS*0.52}px serif`;lc.textAlign='center';lc.textBaseline='middle';lc.fillText('C',LS*0.50,LS*0.50);})();

const ETYPES=[
  {label:'LIQ BOT',  color:'#E24B4A',hp:1,spd:1.1, reward:10,size:22},
  {label:'MEV',      color:'#EF9F27',hp:2,spd:1.8, reward:25,size:18},
  {label:'RUG PULL', color:'#D4537E',hp:3,spd:0.85,reward:50,size:29},
  {label:'FLASH',    color:'#85B7EB',hp:1,spd:3.2, reward:45,size:13},
  {label:'BAD DEBT', color:'#A32D2D',hp:4,spd:0.6, reward:80,size:33},
  {label:'ORACLE',   color:'#533AB7',hp:2,spd:1.4, reward:35,size:20},
  {label:'SANDWICH', color:'#639922',hp:2,spd:1.6, reward:30,size:19},
];
const PUPS=[
  {label:'PENDLE',color:'#1D9E75',effect:'rapidfire',desc:'RAPID FIRE!', duration:300},
  {label:'MORPHO',color:'#378ADD',effect:'multishot',desc:'MULTI-SHOT!', duration:250},
  {label:'BITGO', color:'#F5E98A',effect:'shield',   desc:'SHIELD!',     duration:400},
  {label:'GLOW',  color:'#EF9F27',effect:'bomb',     desc:'NUKE!',       duration:0  },
];

let state='idle';
let score=0,best=+(localStorage.getItem('cd_best')||0);
let tvl=902.3,lives=3,wave=1,chain=1,chainTimer=0;
let bullets=[],enemies=[],particles=[],floats=[],powerups=[];
let player,enemiesLeft=0,waveEnemies=10,spawnInterval=80,spawnTimer=0;
let activePU=null,puTimer=0;
const keys={};
let mouseX=W/2,mouseY=H-55,mouseDown=false;

document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();if((e.key===' '||e.key==='Enter')&&(state==='idle'||state==='dead'))resetGame();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
function toX(cx){const r=canvas.getBoundingClientRect();return Math.max(LS/2,Math.min(W-LS/2,(cx-r.left)*(W/r.width)));}
function toY(cy){const r=canvas.getBoundingClientRect();return Math.max(LS/2,Math.min(H-LS/2,(cy-r.top)*(H/r.height)));}
canvas.addEventListener('mousemove',e=>{mouseX=toX(e.clientX);mouseY=toY(e.clientY);});
canvas.addEventListener('mousedown',e=>{if(state==='idle'||state==='dead'){resetGame();return;}mouseDown=true;});
canvas.addEventListener('mouseup',()=>{mouseDown=false;});
canvas.addEventListener('mouseleave',()=>{mouseDown=false;});
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state==='idle'||state==='dead'){resetGame();return;}mouseDown=true;mouseX=toX(e.touches[0].clientX);mouseY=toY(e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();mouseX=toX(e.touches[0].clientX);mouseY=toY(e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchend',()=>{mouseDown=false;});

function initPlayer(){player={x:W/2,y:H-55,speed:6,cooldown:0};}
function saveBest(){if(score>best){best=score;localStorage.setItem('cd_best',best);}}
function resetGame(){
  score=0;tvl=902.3;lives=3;wave=1;chain=1;chainTimer=0;activePU=null;puTimer=0;
  bullets=[];enemies=[];particles=[];floats=[];powerups=[];
  waveEnemies=10;enemiesLeft=waveEnemies;spawnTimer=0;spawnInterval=80;
  initPlayer();updateHUD();state='playing';
}
function updateHUD(){
  document.getElementById('scoreEl').textContent=score.toLocaleString();
  document.getElementById('tvlEl').textContent='$'+tvl.toFixed(1)+'M';
  document.getElementById('waveEl').textContent=wave;
  document.getElementById('chainEl').textContent='×'+chain;
  document.getElementById('livesEl').textContent='❤️'.repeat(Math.max(0,lives));
  document.getElementById('bestEl').textContent=best.toLocaleString();
}
function spawnEnemy(){
  const maxT=Math.min(wave-1,ETYPES.length-1);
  const t=ETYPES[Math.floor(Math.random()*(maxT+1))];
  enemies.push({x:30+Math.random()*(W-60),y:-35,vx:(Math.random()-0.5)*1.5,vy:t.spd*(0.8+Math.random()*0.4),hp:t.hp+Math.floor(wave/3),maxHp:t.hp+Math.floor(wave/3),reward:t.reward,color:t.color,label:t.label,size:t.size,wobble:Math.random()*Math.PI*2});
}
function spawnPowerup(x,y){
  if(Math.random()>0.2)return;
  const p=PUPS[Math.floor(Math.random()*PUPS.length)];
  powerups.push({x,y,vy:0.9,color:p.color,label:p.label,effect:p.effect,desc:p.desc,duration:p.duration,life:1,wobble:0});
}
function spawnParticles(x,y,color,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color});}}
function spawnFloat(x,y,txt,color){floats.push({x,y:y-10,txt,life:1,color:color||'#F5E98A'});}
function fireBullet(){
  if(player.cooldown>0)return;
  player.cooldown=activePU==='rapidfire'?4:9;
  if(activePU==='multishot'){
    bullets.push({x:player.x-10,y:player.y-20,vx:-1.5,vy:-12});
    bullets.push({x:player.x,   y:player.y-24,vx:0,   vy:-12});
    bullets.push({x:player.x+10,y:player.y-20,vx:1.5, vy:-12});
  }else{bullets.push({x:player.x,y:player.y-24,vx:0,vy:-12});}
}
function doBomb(){
  enemies.forEach(e=>{const pts=e.reward*chain;score+=pts;tvl+=pts*0.01;spawnParticles(e.x,e.y,e.color,14);spawnFloat(e.x,e.y-20,'+'+pts);});
  enemies=[];spawnParticles(W/2,H/2,'#F5E98A',60);spawnFloat(W/2,H/2-30,'VAULT NUKED!','#F5E98A');updateHUD();
}

let stars=null;
function drawStars(){
  if(!stars)stars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.2,a:0.08+Math.random()*0.35,vy:0.04+Math.random()*0.1}));
  stars.forEach(s=>{s.y+=s.vy;if(s.y>H)s.y=0;ctx.globalAlpha=s.a;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
}
function drawGrid(){
  ctx.strokeStyle='rgba(245,233,138,0.025)';ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=44){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=44){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}
function drawPlayer(){
  ctx.save();ctx.shadowColor='#F5E98A';ctx.shadowBlur=activePU?22:10;
  ctx.drawImage(logoCanvas,player.x-LS/2,player.y-LS/2,LS,LS);ctx.shadowBlur=0;
  const grad=ctx.createLinearGradient(player.x,player.y+LS/2,player.x,player.y+LS/2+22);
  grad.addColorStop(0,'rgba(245,233,138,0.95)');grad.addColorStop(1,'rgba(245,233,138,0)');
  ctx.fillStyle=grad;ctx.beginPath();
  ctx.moveTo(player.x-8,player.y+LS/2-3);
  ctx.lineTo(player.x,player.y+LS/2+20+Math.sin(Date.now()/80)*5);
  ctx.lineTo(player.x+8,player.y+LS/2-3);
  ctx.closePath();ctx.fill();ctx.restore();
}
function drawShield(){
  if(activePU!=='shield')return;
  ctx.save();ctx.strokeStyle=`rgba(245,233,138,${0.3+0.2*Math.sin(Date.now()/120)})`;
  ctx.lineWidth=2;ctx.shadowColor='#F5E98A';ctx.shadowBlur=14;
  ctx.beginPath();ctx.arc(player.x,player.y,LS/2+12,0,Math.PI*2);ctx.stroke();ctx.restore();
}
function drawEnemy(e){
  e.wobble+=0.05;const wx=Math.sin(e.wobble)*3;
  ctx.save();ctx.shadowColor=e.color;ctx.shadowBlur=10;ctx.fillStyle=e.color;
  ctx.beginPath();ctx.arc(e.x+wx,e.y,e.size,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.max(7,e.size*0.38)}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(e.label,e.x+wx,e.y);
  if(e.maxHp>1){const bw=e.size*1.7,bx=e.x+wx-bw/2,by=e.y+e.size+5;ctx.fillStyle='#222';ctx.fillRect(bx,by,bw,4);ctx.fillStyle=e.color;ctx.fillRect(bx,by,bw*(e.hp/e.maxHp),4);}
  ctx.restore();
}
function drawBullet(b){ctx.save();ctx.shadowColor='#F5E98A';ctx.shadowBlur=8;ctx.fillStyle='#F5E98A';ctx.fillRect(b.x-2,b.y-8,4,16);ctx.restore();}
function drawPowerup(p){
  p.wobble+=0.06;const bob=Math.sin(p.wobble)*4;
  ctx.save();ctx.shadowColor=p.color;ctx.shadowBlur=14;ctx.fillStyle=p.color;
  rrect(ctx,p.x-22,p.y-12+bob,44,24,6);ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle='#000';
  ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(p.label,p.x,p.y+bob);ctx.restore();
}
function drawPUBar(){
  if(!activePU||!puTimer)return;
  const max=PUPS.find(p=>p.effect===activePU)?.duration||300;
  ctx.fillStyle='rgba(245,233,138,0.1)';ctx.fillRect(8,H-10,W-16,4);
  ctx.fillStyle='#F5E98A';ctx.fillRect(8,H-10,(W-16)*(puTimer/max),4);
}
let tickerX=W;
function drawTicker(){
  const text='  CONCRETE.XYZ  ·  TVL: $'+tvl.toFixed(1)+'M  ·  ASSETS PROCESSED: $11.24B  ·  BACKED BY POLYCHAIN & YZI LABS  ·  WAVE: '+wave+'  ·  CHAIN ×'+chain+'  ';
  ctx.save();ctx.fillStyle='rgba(245,233,138,0.06)';ctx.fillRect(0,0,W,18);
  ctx.fillStyle='rgba(245,233,138,0.5)';ctx.font='9px monospace';ctx.textAlign='left';ctx.textBaseline='middle';
  const tw=ctx.measureText(text).width;
  tickerX-=0.7;if(tickerX<-tw)tickerX=W;
  ctx.fillText(text,tickerX,9);ctx.fillText(text,tickerX+tw,9);ctx.restore();
}
function drawOverlay(title,sub1,sub2,tc){
  ctx.fillStyle='rgba(10,10,10,0.85)';ctx.fillRect(W/2-210,H/2-85,420,170);
  ctx.strokeStyle='rgba(245,233,138,0.18)';ctx.lineWidth=0.5;ctx.strokeRect(W/2-210,H/2-85,420,170);
  ctx.fillStyle=tc||'#F5E98A';ctx.font='bold 24px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(title,W/2,H/2-38);
  ctx.fillStyle='#555';ctx.font='12px monospace';ctx.fillText(sub1,W/2,H/2+2);
  ctx.fillStyle='#F5E98A';ctx.font='12px monospace';ctx.fillText(sub2,W/2,H/2+28);
}

function loop(){
  ctx.clearRect(0,0,W,H);
  drawGrid();drawStars();

  if(state==='idle'){
    ctx.save();ctx.shadowColor='#F5E98A';ctx.shadowBlur=30;
    ctx.drawImage(logoCanvas,W/2-40,H/2-115,80,80);ctx.restore();
    drawOverlay('CONCRETE DEFENDER','Protect the vault. Destroy the threats.','[ CLICK OR SPACE TO START ]');
    drawTicker();requestAnimationFrame(loop);return;
  }
  if(state==='dead'){
    drawOverlay('VAULT DRAINED','CONC earned: '+score.toLocaleString()+'  |  Wave '+wave,'[ CLICK OR SPACE TO RETRY ]','#E24B4A');
    drawTicker();requestAnimationFrame(loop);return;
  }

  player.x=mouseX;player.y=mouseY;
  if(keys['ArrowLeft']||keys['a'])player.x=Math.max(LS/2,player.x-player.speed);
  if(keys['ArrowRight']||keys['d'])player.x=Math.min(W-LS/2,player.x+player.speed);
  if(keys['ArrowUp']||keys['w'])player.y=Math.max(LS/2,player.y-player.speed);
  if(keys['ArrowDown']||keys['s'])player.y=Math.min(H-LS/2,player.y+player.speed);

  if(player.cooldown>0)player.cooldown--;
  if(mouseDown||keys[' '])fireBullet();
  if(puTimer>0){puTimer--;if(puTimer===0)activePU=null;}
  if(chainTimer>0){chainTimer--;if(chainTimer===0){chain=1;updateHUD();}}

  spawnTimer++;
  if(enemiesLeft>0&&spawnTimer>=spawnInterval){spawnTimer=0;spawnEnemy();enemiesLeft--;spawnInterval=Math.max(15,80-wave*5);}
  if(enemiesLeft===0&&enemies.length===0){
    wave++;waveEnemies=10+wave*4;enemiesLeft=waveEnemies;spawnTimer=0;
    chain=Math.min(chain+1,10);spawnFloat(W/2,H/2,'WAVE '+wave+'!  CHAIN ×'+chain,'#F5E98A');updateHUD();
  }

  bullets=bullets.filter(b=>b.y>-10);
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
  enemies.forEach(e=>{e.x+=e.vx;e.y+=e.vy;if(e.x<e.size||e.x>W-e.size)e.vx*=-1;});

  bullets=bullets.filter(b=>{
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i],dx=b.x-e.x,dy=b.y-e.y;
      if(Math.sqrt(dx*dx+dy*dy)<e.size+5){
        e.hp--;
        if(e.hp<=0){const pts=e.reward*chain;score+=pts;tvl+=pts*0.02;spawnParticles(e.x,e.y,e.color,12);spawnFloat(e.x,e.y-22,'+'+pts);spawnPowerup(e.x,e.y);chain=Math.min(chain+1,10);chainTimer=140;enemies.splice(i,1);updateHUD();}
        else spawnParticles(e.x,e.y,e.color,4);
        return false;
      }
    }
    return true;
  });

  enemies=enemies.filter(e=>{
    if(e.y>H+20){
      if(activePU==='shield'){spawnFloat(W/2,H/2,'SHIELD BLOCKED!','#F5E98A');return false;}
      lives--;chain=1;chainTimer=0;tvl=Math.max(0,tvl-5);
      spawnFloat(W/2,H/2,'VAULT HIT! -$5M','#E24B4A');updateHUD();
      if(lives<=0){saveBest();state='dead';}
      return false;
    }
    return true;
  });

  powerups=powerups.filter(p=>{
    p.y+=p.vy;p.life-=0.004;
    const dx=p.x-player.x,dy=p.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<LS/2+22){
      if(p.effect==='bomb')doBomb();
      else{activePU=p.effect;puTimer=p.duration;}
      spawnFloat(p.x,p.y-20,p.desc,p.color);return false;
    }
    return p.y<H+20&&p.life>0;
  });

  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.91;p.vy*=0.91;p.life-=0.033;ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4);});
  ctx.globalAlpha=1;

  floats=floats.filter(f=>f.life>0);
  floats.forEach(f=>{f.y-=0.85;f.life-=0.017;ctx.globalAlpha=f.life;ctx.fillStyle=f.color;ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillText(f.txt,f.x,f.y);});
  ctx.globalAlpha=1;

  enemies.forEach(drawEnemy);
  powerups.forEach(drawPowerup);
  bullets.forEach(drawBullet);
  drawShield();drawPlayer();drawPUBar();drawTicker();
  requestAnimationFrame(loop);
}

updateHUD();
loop();
</script>
</body>
</html>
